# ============================================================
# nginx.conf — Logstash Pipeline (ELK 8.x)
# ============================================================
# STEP-BY-STEP INSTRUCTIONS (Follow in this exact order):
#
# 1. CREATE THE GEO_POINT TEMPLATE (ONE-TIME ACTION)
#    Why: Elasticsearch doesn't know 'location' is a map coordinate by default. 
#    This template tells it to expect map coordinates. You only do this ONCE.
#    Run this in your terminal:
#    curl -X PUT "http://localhost:9200/_index_template/nginx-demo-template" -H "Content-Type: application/json" -d "{\"index_patterns\":[\"nginx-demo*\"],\"template\":{\"mappings\":{\"properties\":{\"source\":{\"properties\":{\"geo\":{\"properties\":{\"location\":{\"type\":\"geo_point\"}}}}}}}}}"
#
# 2. DELETE THE EXISTING INDEX (EVERY TIME YOU RELOAD)
#    Why: If you skip this, Logstash will just dump duplicate logs on top of 
#    the old ones. Also, if your index was created before the template in Step 1, 
#    it's broken. Deleting it forces a fresh start.
#    Run this:
#    curl -X DELETE "http://localhost:9200/nginx-demo"
#
# 3. RESTART LOGSTASH
#    Why: Logstash needs to read this new config file and start processing logs.
#    Run this:
#    docker compose restart logstash
#
# 4. VERIFY THE LOGS ARE PROCESSING
#    Why: You want to make sure it's actually doing the work.
#    Run this (press Ctrl+C to exit when the dots stop):
#    docker logs -f elk-training-logstash-1
#
# 5. CHECK IF MAP COORDINATES WORKED
#    Run this:
#    curl "http://localhost:9200/nginx-demo/_mapping/field/source.geo.location"
#    (It should say type is "geo_point". If it says "float", you skipped Step 2).
# ============================================================
# curl -X GET "http://localhost:9200/nginx-demo/_count?pretty"
# ============================================================
input {
  file {
    path => "/logs/nginx_logs.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    mode => "read"
    file_completed_action => "log"
    file_completed_log_path => "/tmp/logstash_completed.log"
  }
}

filter {
  grok {
    match => { "message" => '%{IPORHOST:[source][ip]} - %{DATA:[user][name]} \[%{HTTPDATE:timestamp}\] \"%{WORD:[http][request][method]} %{DATA:[url][path]} HTTP/%{NUMBER:[http][version]}\" %{NUMBER:[http][response][status_code]:int} %{NUMBER:[http][response][body][bytes]:int} \"%{DATA:[http][request][referrer]}\" \"%{DATA:[user_agent][original]}\"' }
  }

  date {
    match => [ "timestamp", "dd/MMM/yyyy:HH:mm:ss Z" ]
    target => "@timestamp"
  }

  geoip {
    source => "[source][ip]"
    target => "[source]"
    ecs_compatibility => "v8"
  }

  useragent {
    source => "[user_agent][original]"
    target => "user_agent"
  }

  mutate {
    remove_field => [ "timestamp" ]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "nginx-demo"
  }
  
  stdout { codec => dots }
}